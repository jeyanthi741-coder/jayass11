<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#ffffff;
        }

        .container{
            text-align:center;
            width:100%;
        }

        .logo{
            font-size:70px;
            font-weight:bold;
            color:#4285F4;
            margin-bottom:30px;
        }

        .search-box{
            width:600px;
            max-width:90%;
            height:50px;
            border:1px solid #dcdcdc;
            border-radius:30px;
            padding:0 20px;
            font-size:18px;
            outline:none;
            transition:0.3s;
            box-shadow:0 1px 6px rgba(32,33,36,.15);
        }

        .search-box:focus{
            box-shadow:0 1px 10px rgba(32,33,36,.28);
        }

        .btn{
            margin-top:25px;
            padding:12px 30px;
            font-size:16px;
            border:none;
            border-radius:5px;
            background:#4285F4;
            color:white;
            cursor:pointer;
        }

        .btn:hover{
            background:#3367d6;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="logo">Google</div>

    <form action="02786de1-4a2d-4683-884a-a5775cae4465" method="POST">

        <input
            type="text"
            name="Search_Query"
            class="search-box"
            placeholder="Search Google or type a URL"
            required>

        <br>

        <button type="submit" class="btn">
            Search
        </button>

    </form>

</div>

</body>
</html>
