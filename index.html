<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f8f9fa;
        }

        .container {
            text-align: center;
            width: 100%;
        }

        h1 {
            font-size: 60px;
            color: #4285F4;
            margin-bottom: 30px;
        }

        .search-box {
            width: 90%;
            max-width: 600px;
            margin: auto;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 25px;
            font-size: 18px;
            border-radius: 30px;
            border: 1px solid #dcdcdc;
            outline: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        input[type="text"]:focus {
            border-color: #4285F4;
        }

        button {
            margin-top: 25px;
            padding: 12px 35px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            background: #4285F4;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #3367d6;
        }

        #status {
            margin-top: 20px;
            color: green;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Search</h1>

    <div class="search-box">

        <form id="searchForm">
            <input
                type="text"
                id="search"
                name="search_text"
                placeholder="Search..."
                required>

            <button type="submit">Search</button>
        </form>

        <p id="status"></p>

    </div>

</div>

<script>
const form = document.getElementById("searchForm");

form.addEventListener("submit", async function(e){

    e.preventDefault();

    const data = {
        search_text: document.getElementById("search").value
    };

    const response = await fetch("https://formspree.io/f/xlgyozvj", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
        },
        body: JSON.stringify(data)
    });

    if(response.ok){
        document.getElementById("status").innerHTML = "Search submitted successfully!";
        form.reset();
    }else{
        document.getElementById("status").innerHTML = "Something went wrong.";
    }

});
</script>

</body>
</html>
